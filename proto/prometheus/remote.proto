// Minimal subset of Prometheus' prompb remote-write schema — enough to decode
// the metric samples a remote_write client pushes. Field numbers match the
// upstream prompb definitions, so unknown fields (exemplars, native
// histograms, metadata) are simply skipped during decode.
syntax = "proto3";

package prometheus;

message WriteRequest {
  repeated TimeSeries timeseries = 1;
}

message TimeSeries {
  repeated Label labels = 1;
  repeated Sample samples = 2;
}

message Label {
  string name = 1;
  string value = 2;
}

message Sample {
  double value = 1;
  int64 timestamp = 2;
}
